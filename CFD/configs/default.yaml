project:
  name: GasDispersion_3DMambaPINN
  seed: 42
  output_root: outputs

data_generation:
  base_case_dir: ./base_case_auto
  work_dir: ./generated_cases
  stl_dir: ./generated_cases/stl
  n_cases: 1
  domain:
    x: [0.0, 200.0]
    y: [0.0, 200.0]
    z: [0.0, 80.0]
  building:
    n_buildings: [8, 30]
    width: [8.0, 24.0]
    depth: [8.0, 24.0]
    height: [10.0, 70.0]
  wind_speeds: [1.0, 2.5, 4.0, 6.0, 8.0]
  wind_directions_deg: [0, 45, 90, 135, 180, 225, 270, 315]
  leak_rate_range: [0.01, 1.5]
  leak_height_range: [0.5, 3.0]
  solver: buoyantPimpleFoam
  n_procs: 8
  mesh:
    target_cell_size: 2.0
    cartesian_grid: [64, 64, 64]

  template:
    solver: buoyantPimpleFoam
    domain:
      x: [0.0, 200.0]
      y: [0.0, 200.0]
      z: [0.0, 80.0]
    mesh_cells: [80, 80, 40]
    time:
      start_time: 0
      end_time: 100
      delta_t: 0.5
      write_interval: 5
    n_outer_correctors: 2
    n_correctors: 2
    n_non_ortho_correctors: 1
    grad_default: Gauss linear
    div_phi_u: Gauss linearUpwind grad(U)
    div_phi_gas: Gauss upwind
    snappy:
      max_local_cells: 2000000
      max_global_cells: 6000000
      surface_refinement_min: 2
      surface_refinement_max: 3
      location_in_mesh: [10, 10, 2]

preprocess:
  lambda_log: 100000000.0
  eps: 1.0e-12

model:
  in_channels: 6
  out_channels: 1
  base_channels: 32
  depth: 4
  mamba_dim: 256
  mamba_layers: 4
  mamba_state_dim: 16
  dropout: 0.1

physics:
  dt: 0.5
  dx: 2.0
  dy: 2.0
  dz: 2.0
  d_eff: 0.02

train:
  train_data_h5: ./dataset/train.h5
  val_data_h5: ./dataset/val.h5
  batch_size: 1
  num_workers: 4
  epochs: 2
  lr: 0.0002
  weight_decay: 1.0e-6
  warmup_epochs: 10
  lambda_physics_final: 0.1
  grad_clip_norm: 1.0
  amp: true
  device: cuda
  checkpoint_dir: ./outputs/checkpoints
